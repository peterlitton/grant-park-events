<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Index Report - Grant Park Events</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  
  <script>
    const {useState,useEffect}=React;
    const e=React.createElement;
    
    // Build version: Build10.14.11 — GSC Index Report cache fix + status mapping
    
    // Helper: Format event date from YYYY-MM-DD to MM/DD/YY
    const formatEventDate = (dateStr) => {
      if (!dateStr) return '';
      const [year, month, day] = dateStr.split('-');
      return `${month}/${day}/${year.slice(2)}`;
    };
    
    // Helper: Extract event slug from URL
    const truncateUrl = (url, pageType) => {
      const baseUrl = 'https://www.grantparkevents.com';
      
      if (url.startsWith(baseUrl + '/events/')) {
        // For events: show "events/2026-05-27-..."
        const slug = url.substring(baseUrl.length + 1); // Remove domain, keep "/events/..."
        return slug.startsWith('/') ? slug.substring(1) : slug; // Remove leading slash if present
      }
      
      // For non-event pages: show path without domain (e.g., "/about" → "about")
      let path = url.replace(baseUrl, '');
      return path.startsWith('/') ? path.substring(1) : path;
    };
    
    // Helper: Format time ago
    const timeAgo = (isoString) => {
      if (!isoString) return null;
      const now = new Date();
      const then = new Date(isoString);
      const diffMs = now - then;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);
      
      if (diffMins < 1) return 'just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      return `${Math.floor(diffDays / 7)}w ago`;
    };
    
    // Helper: Format time for display (e.g., "2:45 PM today")
    const formatTime = (isoString) => {
      if (!isoString) return 'Never';
      const date = new Date(isoString);
      const now = new Date();
      const isToday = date.toDateString() === now.toDateString();
      
      const hours = date.getHours();
      const minutes = date.getMinutes();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      const displayHours = hours % 12 || 12;
      const displayMinutes = minutes.toString().padStart(2, '0');
      
      if (isToday) {
        return `${displayHours}:${displayMinutes} ${ampm} today`;
      } else {
        const month = date.getMonth() + 1;
        const day = date.getDate();
        return `${month}/${day} ${displayHours}:${displayMinutes} ${ampm}`;
      }
    };
    
    // Helper: Format date for Updated column (MM/DD/YY format, matching Event Date)
    const formatDate = (isoTimestamp) => {
      if (!isoTimestamp) return '—';
      
      const date = new Date(isoTimestamp);
      const month = (date.getMonth() + 1).toString().padStart(2, '0');
      const day = date.getDate().toString().padStart(2, '0');
      const year = date.getFullYear().toString().slice(2);
      
      return `${month}/${day}/${year}`;
    };
    
    // Helper: Format full timestamp for tooltip
    const formatFullTimestamp = (isoTimestamp) => {
      if (!isoTimestamp) return 'Unknown';
      return new Date(isoTimestamp).toLocaleString('en-US', {
        dateStyle: 'medium',
        timeStyle: 'short',
        timeZone: 'America/Chicago'
      });
    };
    
    const IndexReportApp=()=>{
      const [pages,setPages]=useState([]);
      const [loading,setLoading]=useState(true);
      const [error,setError]=useState(null);
      const [filter,setFilter]=useState('all');
      const [refreshing,setRefreshing]=useState(false);
      const [lastUpdated,setLastUpdated]=useState(null);
      const [,setTick]=useState(0); // Build10.17.5: force re-render every 60s for age display
      useEffect(()=>{const t=setInterval(()=>setTick(n=>n+1),60000);return()=>clearInterval(t);},[]);
      const [requestingIndex,setRequestingIndex]=useState({});
      const [sortBy,setSortBy]=useState('lastEdited'); // 'eventDate' or 'lastEdited'
      const [sortOrder,setSortOrder]=useState('desc'); // 'asc' or 'desc'
      // Build10.13.2: Progress tracking for background loading
      const [loadProgress,setLoadProgress]=useState({loaded:0,total:0,isLoading:true});
      const [autoLoadComplete,setAutoLoadComplete]=useState(false);
      // Build10.13.8: Removed debug panel (showDebug, debugInfo states)
      
      // Build10.13.8: Smart cache configuration (aggressive policy)
      const CACHE_KEY='gsc-index-report-cache';
      
      // Build10.13.16: Helper to get Central Time midnight
      const getCTMidnightToday=()=>{
        const now=new Date();
        // Get CT offset (-6 in CST, -5 in CDT)
        const ctOffset=-6; // CST (adjust for DST if needed)
        const utcTime=now.getTime()+(now.getTimezoneOffset()*60000);
        const ctTime=new Date(utcTime+(3600000*ctOffset));
        
        // Set to midnight CT
        ctTime.setHours(0,0,0,0);
        return ctTime;
      };
      
      const CACHE_POLICY={
        // Build10.13.16: Daily reset at CT midnight
        DAILY_RESET:true // Cache is valid until CT midnight, then reset
      };
      
      // Build10.13.8: Cache helper functions (Build10.13.16: Modified for daily reset)
      const loadFromCache=()=>{
        try{
          const cached=localStorage.getItem(CACHE_KEY);
          if(!cached)return null;
          
          const data=JSON.parse(cached);
          const cacheTimestamp=new Date(data.timestamp);
          
          // Build10.13.16: Check if cache is from today (CT timezone)
          const midnightCT=getCTMidnightToday();
          
          if(cacheTimestamp<midnightCT){
            // Cache is from yesterday or earlier - force reload
            console.log('[CACHE] Cache is from yesterday or earlier - forcing reload');
            localStorage.removeItem(CACHE_KEY); // Clear old cache
            return null;
          }
          
          const age=Date.now()-cacheTimestamp.getTime();
          console.log('[CACHE] Found cached data from today, age:',Math.round(age/1000/60),'minutes');
          
          return {
            pages:data.pages||[],
            timestamp:data.timestamp,
            age:age
          };
        }catch(err){
          console.error('[CACHE] Error loading cache:',err);
          return null;
        }
      };
      
      const saveToCache=(pages)=>{
        try{
          const cacheData={
            timestamp:new Date().toISOString(),
            pages:pages
          };
          localStorage.setItem(CACHE_KEY,JSON.stringify(cacheData));
          console.log('[CACHE] Saved',pages.length,'pages to cache');
        }catch(err){
          console.error('[CACHE] Error saving cache:',err);
        }
      };
      
      // Build10.13.2: Auto-load all future events in background
      // Build10.14.11: Added forceRefresh param to bypass server-side Blob cache
      const autoLoadAllEvents=async(forceReload=false,forceServerRefresh=false)=>{
        console.log('[INDEX-REPORT] Starting background auto-load...',forceReload?'(forced)':'',forceServerRefresh?'(server cache bypass)':'');
        setError(null);
        
        // Build10.13.16: Check cache first (daily reset at CT midnight)
        if(!forceReload){
          const cached=loadFromCache();
          if(cached){
            // Cache is from today - use it
            console.log('[CACHE] Using cached data from today - no reload needed');
            setPages(cached.pages);
            setLoading(false);
            setLoadProgress({loaded:cached.pages.length,total:cached.pages.length,isLoading:false});
            setAutoLoadComplete(true);
            setLastUpdated(new Date(cached.timestamp));
            return; // Done - cache is fresh
          }
        }
        
        // Build10.13.9: Now set loading progress (only if actually loading, not using instant cache)
        setLoadProgress({loaded:0,total:0,isLoading:true});
        
        let offset=0;
        const limit=1; // Build10.13.5: 1 URL per batch (OAuth + blob + GSC API = ~8sec, must stay under 26sec Netlify timeout)
        let hasMore=true;
        let allPages=[];
        
        try{
          while(hasMore){
            console.log(`[INDEX-REPORT] Loading batch at offset ${offset}...`);
            
            // Build10.14.11: Add forceRefresh param to bypass server-side Blob cache
            const refreshParam=forceServerRefresh?'&forceRefresh=true':'';
            const url=`/.netlify/functions/gsc-index-status?offset=${offset}&limit=${limit}&futureOnly=true${refreshParam}`;
            
            const response=await fetch(url);
            
            if(!response.ok){
              throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const data=await response.json();
            
            if(data.error){
              throw new Error(data.error);
            }
            
            // Append new pages
            allPages=[...allPages,...(data.pages||[])];
            setPages(allPages);
            
            // Build10.13.5: Set loading=false after first batch so table shows immediately
            if(offset===0){
              setLoading(false);
              console.log('[INDEX-REPORT] First batch loaded - showing table with progressive updates');
            }
            
            // Update progress
            const totalUrls=data.meta?.total||0;
            const loadedSoFar=offset+data.pages.length;
            setLoadProgress({
              loaded:loadedSoFar,
              total:totalUrls,
              isLoading:true
            });
            
            console.log(`[INDEX-REPORT] Progress: ${loadedSoFar}/${totalUrls}`);
            
            // Build10.14.9: Progressive cache save - save after each batch so cache works
            // even if user navigates away before all URLs load
            saveToCache(allPages);
            
            // Check if more to load
            hasMore=data.meta?.hasMore||false;
            offset+=limit;
            
            // Small delay to avoid hammering the function
            if(hasMore){
              await new Promise(resolve=>setTimeout(resolve,500));
            }
          }
          
          // All done
          console.log(`[INDEX-REPORT] Auto-load complete! Loaded ${allPages.length} URLs`);
          setLoadProgress(prev=>({...prev,isLoading:false}));
          setAutoLoadComplete(true);
          setLastUpdated(new Date());
          setLoading(false);
          
          // Build10.13.8: Save to cache
          saveToCache(allPages);
          
        }catch(err){
          console.error('[INDEX-REPORT] Auto-load error:',err);
          setError(err.message);
          setLoadProgress(prev=>({...prev,isLoading:false}));
          setLoading(false);
        }
      };
      
      // Build10.13.3: Debug test function
      // Build10.13.8: Removed testFunctionCall (debug panel removed)
      
      // Build10.13.2: Manual "Load More Events" backup function
      const loadMoreEvents=async()=>{
        console.log('[INDEX-REPORT] Manual load more triggered');
        setRefreshing(true);
        
        try{
          const currentOffset=pages.length;
          const response=await fetch(`/.netlify/functions/gsc-index-status?offset=${currentOffset}&limit=1&futureOnly=true`); // Build10.13.5: Changed to 1
          
          if(!response.ok){
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }
          
          const data=await response.json();
          
          if(data.error){
            throw new Error(data.error);
          }
          
          // Append new pages
          const updatedPages=[...pages,...(data.pages||[])];
          setPages(updatedPages);
          
          // Update progress
          setLoadProgress({
            loaded:updatedPages.length,
            total:data.meta?.total||updatedPages.length,
            isLoading:!data.meta?.hasMore
          });
          
          if(!data.meta?.hasMore){
            setAutoLoadComplete(true);
          }
          
          setLastUpdated(new Date());
          
        }catch(err){
          console.error('[INDEX-REPORT] Manual load error:',err);
          setError(err.message);
        }finally{
          setRefreshing(false);
        }
      };
      
      // Build10.13.2: Refresh button - clears and reloads all data
      // Build10.14.11: Now bypasses BOTH client-side AND server-side Blob cache
      const refreshAllData=async()=>{
        console.log('[INDEX-REPORT] Manual refresh triggered - bypassing ALL caches (client + server)');
        setPages([]);
        setAutoLoadComplete(false);
        await autoLoadAllEvents(true, true); // Build10.14.11: forceReload=true, forceServerRefresh=true
      };
      
      // Request indexing for a specific URL
      const requestIndexing=async(url)=>{
        setRequestingIndex(prev=>({...prev,[url]:true}));
        
        try{
          const response=await fetch('/.netlify/functions/gsc-request-index',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({url})
          });
          
          const data=await response.json();
          
          if(data.error){
            alert(`Error: ${data.error}`);
          }else{
            alert(`✅ Index request submitted for:\\n${url}`);
            // Build10.13.9: Refresh status after requesting (was fetchIndexStatus which didn't exist)
            setTimeout(()=>refreshAllData(),2000); // Delay 2sec to allow GSC to process
          }
        }catch(err){
          alert(`Error requesting index: ${err.message}`);
        }finally{
          setRequestingIndex(prev=>({...prev,[url]:false}));
        }
      };
      
      // Handle column sort
      const handleSort=(column)=>{
        if(sortBy===column){
          // Same column - toggle direction
          setSortOrder(sortOrder==='asc'?'desc':'asc');
        }else{
          // New column - default to descending (newest first)
          setSortBy(column);
          setSortOrder('desc');
        }
      };
      
      // Build10.13.2: Initial load - auto-load all future events in background
      useEffect(()=>{
        autoLoadAllEvents();
      },[]);
      
      // Filter pages
      // Build10.14.11: Updated filters for comprehensive status mapping
      let filteredPages=pages.filter(page=>{
        // Apply status filter
        if(filter==='all'){}
        else if(filter==='indexed'&&page.status!=='indexed')return false;
        else if(filter==='discovered'&&page.status!=='discovered')return false;
        else if(filter==='pending'&&!(page.status==='crawled-not-indexed'||page.status==='pending'||page.status==='redirect'))return false;
        else if(filter==='excluded'&&!(page.status==='excluded'||page.status==='noindex'||page.status==='duplicate'))return false;
        else if(filter==='events'&&page.type!=='event')return false;
        
        return true;
      });
      
      // Sort pages based on user selection
      filteredPages=filteredPages.sort((a,b)=>{
        let compareValue=0;
        
        if(sortBy==='eventDate'){
          const dateA=a.eventDate?new Date(a.eventDate):null;
          const dateB=b.eventDate?new Date(b.eventDate):null;
          if(!dateA&&!dateB)compareValue=0;
          else if(!dateA)compareValue=1; // null dates go to end
          else if(!dateB)compareValue=-1;
          else compareValue=dateA-dateB;
        }
        else if(sortBy==='lastEdited'){
          const dateA=a.updatedAt?new Date(a.updatedAt):null;
          const dateB=b.updatedAt?new Date(b.updatedAt):null;
          if(!dateA&&!dateB)compareValue=0;
          else if(!dateA)compareValue=1; // null dates go to end
          else if(!dateB)compareValue=-1;
          else compareValue=dateA-dateB;
        }
        
        return sortOrder==='asc'?compareValue:-compareValue;
      });
      
      // Build10.14.11: Comprehensive status icons matching new server-side mapping
      const getStatusIcon=(status)=>{
        if(status==='indexed')return '✅';
        if(status==='pending')return '⏳';
        if(status==='requested')return '🔄';
        if(status==='noindex')return '🚫';
        if(status==='excluded')return '❌';
        if(status==='discovered')return '🔍';
        if(status==='crawled-not-indexed')return '🕷️';
        if(status==='redirect')return '↪️';
        if(status==='duplicate')return '📋';
        if(status==='error')return '⚠️';
        if(status==='unknown')return '❓';
        return '❓';
      };
      
      // Build10.14.11: Comprehensive status colors matching new server-side mapping
      const getStatusColor=(status)=>{
        if(status==='indexed')return 'text-green-600';
        if(status==='pending')return 'text-yellow-600';
        if(status==='requested')return 'text-blue-600';
        if(status==='noindex')return 'text-gray-500';
        if(status==='excluded')return 'text-red-600';
        if(status==='discovered')return 'text-orange-600';
        if(status==='crawled-not-indexed')return 'text-amber-600';
        if(status==='redirect')return 'text-purple-600';
        if(status==='duplicate')return 'text-indigo-600';
        if(status==='error')return 'text-red-700';
        if(status==='unknown')return 'text-gray-400';
        return 'text-gray-400';
      };
      
      // Build10.14.11: Show request button for all non-indexed statuses
      const showRequestButton=(status)=>{
        return status==='pending'||status==='excluded'||status==='discovered'||
               status==='crawled-not-indexed'||status==='redirect'||
               status==='duplicate'||status==='unknown';
      };
      
      // Build10.14.11: Updated stats for comprehensive status mapping
      const stats=React.useMemo(()=>({
        total:pages.length,
        indexed:pages.filter(p=>p.status==='indexed').length,
        discovered:pages.filter(p=>p.status==='discovered').length,
        pending:pages.filter(p=>p.status==='crawled-not-indexed'||p.status==='pending'||p.status==='redirect').length,
        excluded:pages.filter(p=>p.status==='excluded'||p.status==='noindex'||p.status==='duplicate').length,
        events:pages.filter(p=>p.type==='event').length,
        static:pages.filter(p=>p.type==='static'||p.type==='index').length
      }),[pages]);
      
      return e('div',{className:'min-h-screen pb-12'},
        // Header
        // Build10.13.17: Admin header with tabs (matching admin.html)
        e('header',{className:'bg-gradient-to-r from-red-600 to-red-700 text-white py-8 shadow-lg'},
          e('div',{className:'max-w-7xl mx-auto px-4'},
            e('div',{className:'flex justify-between items-start'},
              e('div',null,
                e('h1',{className:'text-3xl font-bold mb-2'},'⭐ Grant Park Events Control Panel'),
                e('p',{className:'text-red-100'},'Index Report - Google Search Console Status')
              ),
              e('div',{className:'text-right'},
                e('div',{className:'text-red-100 text-sm mb-2'},
                  '👤 ',sessionStorage.getItem('gpe_admin_user')||'Admin'
                ),
                e('button',{
                  onClick:()=>window.location.href='/admin',
                  className:'bg-white bg-opacity-20 hover:bg-opacity-30 px-4 py-2 rounded-lg text-sm font-semibold transition'
                },'🚪 Logout')
              )
            )
          )
        ),
        
        // Build10.17.5: Minimal nav bar (replaces old fake tab bar that was always out of sync with admin.html)
        e('div',{className:'bg-white shadow-sm sticky top-0 z-10'},
          e('div',{className:'max-w-7xl mx-auto px-4'},
            e('div',{className:'flex items-center justify-between py-3'},
              e('div',{className:'flex items-center gap-4'},
                e('a',{
                  href:'/admin',
                  className:'flex items-center gap-2 text-gray-600 hover:text-red-600 font-semibold text-sm transition'
                },'← Back to Admin'),
                e('div',{className:'border-l-2 border-gray-300 h-5'}),
                e('span',{className:'font-semibold text-sm text-red-600 border-b-2 border-red-600 py-1'},'Index Report')
              ),
              // Refresh button on the right
              e('div',{className:'flex items-center gap-2'},
                e('p',{className:'text-xs text-gray-500'},
                  lastUpdated?(()=>{
                    const ageMs=Date.now()-new Date(lastUpdated).getTime();
                    const ageMin=Math.round(ageMs/1000/60);
                    if(ageMin<1)return 'Updated just now';
                    if(ageMin===1)return 'Updated 1 minute ago';
                    return `Updated ${ageMin} minutes ago`;
                  })():'Loading...'
                ),
                e('button',{
                  onClick:refreshAllData,
                  disabled:loadProgress.isLoading,
                  className:'px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 flex items-center gap-2 text-sm',
                  title:'Bypasses all caches and queries Google fresh'
                },
                  loadProgress.isLoading&&e('div',{className:'w-4 h-4 border-2 border-white border-t-transparent rounded-full spinner'}),
                  '🔄 Fresh Refresh'
                )
              )
            )
          )
        ),
        
        // Main content
        e('div',{className:'max-w-7xl mx-auto px-4 py-6'},
          // Build10.13.8: Removed debug panel
          
          // GSC Quick Links
          e('div',{className:'bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4'},
            e('div',{className:'flex items-center justify-between flex-wrap gap-4'},
              e('div',{className:'flex items-center gap-2 flex-wrap'},
                e('span',{className:'font-semibold text-blue-900 mr-2'},'🔗 Google Search Console:'),
                e('a',{
                  href:'https://search.google.com/search-console?resource_id=sc-domain%3Agrantparkevents.com',
                  target:'_blank',
                  rel:'noopener noreferrer',
                  className:'text-blue-600 hover:text-blue-800 underline text-sm'
                },'Overview'),
                e('span',{className:'text-gray-400'},'|'),
                e('a',{
                  href:'https://search.google.com/search-console/performance/search-analytics?resource_id=sc-domain%3Agrantparkevents.com',
                  target:'_blank',
                  rel:'noopener noreferrer',
                  className:'text-blue-600 hover:text-blue-800 underline text-sm'
                },'Performance'),
                e('span',{className:'text-gray-400'},'|'),
                e('a',{
                  href:'https://search.google.com/search-console/index?resource_id=sc-domain%3Agrantparkevents.com',
                  target:'_blank',
                  rel:'noopener noreferrer',
                  className:'text-blue-600 hover:text-blue-800 underline text-sm'
                },'Pages'),
                e('span',{className:'text-gray-400'},'|'),
                e('a',{
                  href:'https://search.google.com/search-console/sitemaps?resource_id=sc-domain%3Agrantparkevents.com',
                  target:'_blank',
                  rel:'noopener noreferrer',
                  className:'text-blue-600 hover:text-blue-800 underline text-sm'
                },'Sitemaps')
              )
            )
          ),
          
          // Summary Stats Cards
          !loading&&!error&&e('div',{className:'grid grid-cols-1 md:grid-cols-5 gap-4 mb-4'},
            // Total Pages (Build10.13.15: Clickable to show all)
            e('div',{
              className:`bg-white rounded-lg shadow-sm p-4 border-l-4 border-blue-500 cursor-pointer hover:bg-blue-50 transition ${filter==='all'?'ring-2 ring-blue-500':''}`,
              onClick:()=>setFilter('all')
            },
              e('div',{className:'text-sm text-gray-500'},'Total Pages'),
              e('div',{className:'text-2xl font-bold text-gray-900'},stats.total),
              e('div',{className:'text-xs text-gray-500 mt-1'},
                stats.total>0?`${stats.events} events, ${stats.static} static`:''
              ),
              e('a',{
                href:'https://search.google.com/search-console/index?resource_id=sc-domain%3Agrantparkevents.com',
                target:'_blank',
                rel:'noopener noreferrer',
                className:'text-xs text-blue-600 hover:underline mt-1 inline-block',
                onClick:(e)=>e.stopPropagation()  // Prevent filter toggle when clicking GSC link
              },'View in GSC →')
            ),
            
            // Indexed Pages (Build10.13.14: Clickable filter)
            e('div',{
              className:`bg-white rounded-lg shadow-sm p-4 border-l-4 border-green-500 cursor-pointer hover:bg-green-50 transition ${filter==='indexed'?'ring-2 ring-green-500':''}`,
              onClick:()=>setFilter('indexed')
            },
              e('div',{className:'text-sm text-gray-500'},'Indexed'),
              e('div',{className:'text-2xl font-bold text-green-600'},stats.indexed),
              e('div',{className:'text-xs text-gray-400 mt-1'},
                stats.total>0?`${Math.round(stats.indexed/stats.total*100)}%`:'0%'
              )
            ),
            
            // Build10.13.7: Discovered Pages (Build10.13.14: Clickable filter)
            e('div',{
              className:`bg-white rounded-lg shadow-sm p-4 border-l-4 border-orange-500 cursor-pointer hover:bg-orange-50 transition ${filter==='discovered'?'ring-2 ring-orange-500':''}`,
              onClick:()=>setFilter('discovered')
            },
              e('div',{className:'text-sm text-gray-500'},'Discovered'),
              e('div',{className:'text-2xl font-bold text-orange-600'},stats.discovered),
              e('div',{className:'text-xs text-gray-400 mt-1'},
                stats.total>0?`${Math.round(stats.discovered/stats.total*100)}%`:'0%'
              )
            ),
            
            // Build10.13.7: Pending Pages (Build10.13.14: Clickable filter)
            e('div',{
              className:`bg-white rounded-lg shadow-sm p-4 border-l-4 border-indigo-500 cursor-pointer hover:bg-indigo-50 transition ${filter==='pending'?'ring-2 ring-indigo-500':''}`,
              onClick:()=>setFilter('pending')
            },
              e('div',{className:'text-sm text-gray-500'},'Pending'),
              e('div',{className:'text-2xl font-bold text-indigo-600'},stats.pending),
              e('div',{className:'text-xs text-gray-400 mt-1'},
                stats.total>0?`${Math.round(stats.pending/stats.total*100)}%`:'0%'
              )
            ),
            
            // Excluded Pages (Build10.13.14: Clickable filter)
            e('div',{
              className:`bg-white rounded-lg shadow-sm p-4 border-l-4 border-yellow-500 cursor-pointer hover:bg-yellow-50 transition ${filter==='excluded'?'ring-2 ring-yellow-500':''}`,
              onClick:()=>setFilter('excluded')
            },
              e('div',{className:'text-sm text-gray-500'},'Excluded'),
              e('div',{className:'text-2xl font-bold text-yellow-600'},stats.excluded),
              e('div',{className:'text-xs text-gray-400 mt-1'},
                stats.total>0?`${Math.round(stats.excluded/stats.total*100)}%`:'0%'
              )
            )
          ),
          
          
          // Build10.13.15: Updated help text - Total Pages shows all (Build10.13.16: REMOVED)
          
          // Build10.13.5: Initial loading state (only shows before first batch)
          loading&&e('div',{className:'text-center py-12'},
            e('div',{className:'w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full spinner mx-auto mb-4'}),
            e('p',{className:'text-gray-500 mb-2'},'Loading index status...'),
            e('p',{className:'text-sm text-gray-600'},'Initializing...')
          ),
          
          // Build10.13.5: Progressive loading indicator (shows while batches load)
          !loading&&loadProgress.isLoading&&e('div',{className:'bg-blue-50 border-l-4 border-blue-600 p-4 mb-4'},
            e('div',{className:'flex items-center gap-3'},
              e('div',{className:'w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full spinner'}),
              e('div',{},
                e('p',{className:'text-sm font-medium text-blue-900'},'Loading more results...'),
                loadProgress.total>0&&e('p',{className:'text-xs text-blue-700'},
                  `Progress: ${loadProgress.loaded} of ${loadProgress.total} URLs checked`
                )
              )
            )
          ),
          
          // Error state
          error&&e('div',{className:'bg-red-50 border border-red-200 rounded-lg p-6 text-center'},
            e('p',{className:'text-red-800 font-semibold mb-2'},'Error loading index status'),
            e('p',{className:'text-red-600 text-sm mb-4'},error)
          ),
          
          // Table
          !loading&&!error&&e('div',{className:'bg-white rounded-lg shadow-sm overflow-hidden'},
            e('div',{className:'overflow-x-auto'},
              e('table',{className:'w-full'},
                e('thead',{className:'bg-gray-50 border-b border-gray-200'},
                  e('tr',{},
                    e('th',{className:'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider'},'URL HTTPS://WWW.GRANTPARKEVENTS.COM/'),
                    e('th',{
                      className:'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100 select-none whitespace-nowrap',
                      onClick:()=>handleSort('eventDate')
                    },'Event Date '+(sortBy==='eventDate'?(sortOrder==='asc'?'↑':'↓'):'')),
                    e('th',{
                      className:'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100 select-none whitespace-nowrap',
                      onClick:()=>handleSort('lastEdited')
                    },'Updated '+(sortBy==='lastEdited'?(sortOrder==='asc'?'↑':'↓'):'')),
                    e('th',{className:'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider'},'Type'),
                    e('th',{className:'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider'},'Status'),
                    e('th',{className:'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider'},'Actions')
                  )
                ),
                e('tbody',{className:'divide-y divide-gray-200'},
                  filteredPages.length===0?
                    e('tr',{},
                      e('td',{colSpan:6,className:'px-6 py-8 text-center text-gray-500'},'No pages found')
                    ):
                  filteredPages.map((page,idx)=>{
                    const reqData = page.requestData;
                    const hasError = reqData?.status === 'failed';
                    const errorText = reqData?.error || '';
                    const attemptCount = reqData?.attempts || 0;
                    
                    // Build status tooltip
                    let statusTooltip = page.details || '';
                    if (reqData?.requestedAt) {
                      const lastChecked = formatTime(reqData.requestedAt);
                      statusTooltip += (statusTooltip ? '\n' : '') + `Last checked: ${lastChecked}`;
                    }
                    
                    return e('tr',{key:idx,className:'hover:bg-gray-50'},
                      // URL column
                      e('td',{
                        className:'px-6 py-4 text-sm text-gray-900 font-mono',
                        title:page.url
                      },truncateUrl(page.url, page.type)),
                      
                      // Event Date column
                      e('td',{className:'px-6 py-4 text-sm text-gray-600'},
                        formatEventDate(page.eventDate)
                      ),
                      
                      // Updated column
                      e('td',{
                        className:'px-6 py-4 text-sm text-gray-600',
                        title:page.updatedAt?formatFullTimestamp(page.updatedAt):'Static page'
                      },
                        formatDate(page.updatedAt)
                      ),
                      
                      // Type column
                      e('td',{className:'px-6 py-4 text-sm text-gray-600'},
                        e('span',{className:'px-2 py-1 bg-gray-100 rounded text-xs'},page.type)
                      ),
                      
                      // Status column with tooltip + raw GSC data
                      e('td',{
                        className:`px-6 py-4 text-sm font-medium ${getStatusColor(page.status)}`,
                        title:statusTooltip
                      },
                        hasError?
                          e('span',{
                            className:'cursor-help',
                            title:`❌ ${errorText}\nAttempts: ${attemptCount}`
                          },
                            '❌ Failed' + (attemptCount > 1 ? ` (${attemptCount} attempts)` : '')
                          ):
                          e('div',null,
                            getStatusIcon(page.status)+' '+page.status,
                            // Build10.14.9: Show raw GSC API response for diagnostics
                            page.gscData?e('div',{className:'text-xs text-gray-400 mt-1 font-normal'},
                              page.gscData.verdict+' / '+page.gscData.coverageState
                            ):
                            page.fromCache?e('div',{className:'text-xs text-gray-400 mt-1 font-normal'},'(cached)'):null
                          )
                      ),
                      
                      // Actions column
                      e('td',{className:'px-6 py-4 text-sm'},
                        e('div',{className:'flex gap-2 items-center'},
                          reqData?.requestedAt && !hasError?
                            e('span',{className:'text-xs text-gray-500'},`Requested ${timeAgo(reqData.requestedAt)}`):
                          showRequestButton(page.status)?
                            e('button',{
                              onClick:()=>requestIndexing(page.url),
                              disabled:requestingIndex[page.url],
                              className:'px-3 py-1 bg-blue-600 text-white text-xs rounded hover:bg-blue-700 disabled:opacity-50 whitespace-nowrap'
                            },requestingIndex[page.url]?'...':'Request Index'):
                            null,
                          
                          // Inspect URL — native link + clipboard copy
                          e('a',{
                            href:'https://search.google.com/search-console?resource_id=sc-domain:grantparkevents.com',
                            target:'_blank',
                            rel:'noopener noreferrer',
                            onClick:() => {
                              try { navigator.clipboard.writeText(page.url); } catch(ex) {}
                            },
                            className:'px-3 py-1 bg-gray-100 text-gray-700 text-xs rounded hover:bg-gray-200 whitespace-nowrap text-center inline-block',
                            title:'Copies URL to clipboard & opens GSC'
                          },'🔍 Inspect')
                        )
                      )
                    );
                  })
                )
              )
            ),
            
            // Build10.13.2: Summary and Load More button
            e('div',{className:'bg-gray-50 px-6 py-3 border-t border-gray-200'},
              e('div',{className:'flex items-center justify-between flex-wrap gap-4'},
                // Summary text
                e('div',{className:'text-sm text-gray-600'},
                  loadProgress.isLoading?
                    `Loading... ${loadProgress.loaded} of ${loadProgress.total} URLs checked`:
                    autoLoadComplete?
                      `✓ All ${pages.length} URLs checked`:
                      `Showing ${filteredPages.length} of ${pages.length} pages`
                ),
                // Load More button (always visible as backup)
                !autoLoadComplete&&!loadProgress.isLoading&&e('button',{
                  onClick:loadMoreEvents,
                  disabled:refreshing||loadProgress.isLoading,
                  className:'px-4 py-2 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700 disabled:opacity-50 flex items-center gap-2'
                },
                  refreshing&&e('div',{className:'w-3 h-3 border-2 border-white border-t-transparent rounded-full spinner'}),
                  '📥 Load More Events'
                )
              )
            )
          ),
          
          // Build10.13.16: Sitemap Status Widget (moved below table)
          !loading&&!error&&e('div',{className:'bg-white rounded-lg shadow-sm p-4 mt-4'},
            e('div',{className:'flex items-center justify-between mb-3'},
              e('h3',{className:'font-semibold text-gray-900'},'📄 Sitemap Status'),
              e('a',{
                href:'https://search.google.com/search-console/sitemaps?resource_id=sc-domain%3Agrantparkevents.com',
                target:'_blank',
                rel:'noopener noreferrer',
                className:'text-sm text-blue-600 hover:underline'
              },'View All Sitemaps →')
            ),
            e('div',{className:'grid grid-cols-1 md:grid-cols-3 gap-3 text-sm'},
              e('div',{className:'flex items-center gap-2'},
                e('span',{className:'text-green-600'},'✅'),
                e('span',{className:'text-gray-700 font-mono text-xs'},'/sitemap.xml'),
                e('span',{className:'text-gray-400 text-xs'},'(index)')
              ),
              e('div',{className:'flex items-center gap-2'},
                e('span',{className:'text-green-600'},'✅'),
                e('span',{className:'text-gray-700 font-mono text-xs'},'/sitemap-pages.xml'),
                e('span',{className:'text-gray-400 text-xs'},'(3 pages)')
              ),
              e('div',{className:'flex items-center gap-2'},
                e('span',{className:'text-blue-600'},'🔄'),
                e('span',{className:'text-gray-700 font-mono text-xs'},'/.netlify/functions/sitemap-events'),
                e('span',{className:'text-gray-400 text-xs'},'(dynamic)')
              )
            )
          )
        )
      );
    };
    
    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(IndexReportApp));
  </script>
</body>
</html>
