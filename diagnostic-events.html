<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Data Diagnostic - Grant Park Events</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
  <div class="max-w-6xl mx-auto">
    <div class="bg-white rounded-lg shadow-lg p-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">🔍 Production Event Data Diagnostic</h1>
      <p class="text-gray-600 mb-6">READ-ONLY analysis of current Netlify Blobs data</p>

      <button 
        onclick="runDiagnostic()" 
        class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 mb-6"
      >
        Run Diagnostic
      </button>

      <div id="loading" class="hidden mb-6">
        <div class="flex items-center gap-3 text-blue-600">
          <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>Reading production data...</span>
        </div>
      </div>

      <div id="results" class="hidden">
        <div class="space-y-6">
          <!-- Summary -->
          <div class="border-l-4 border-blue-500 bg-blue-50 p-4">
            <h2 class="text-xl font-bold text-blue-900 mb-2">📊 Summary</h2>
            <div id="summary" class="grid grid-cols-2 gap-4"></div>
          </div>

          <!-- Hardcoded Event Status -->
          <div class="border-l-4 border-purple-500 bg-purple-50 p-4">
            <h2 class="text-xl font-bold text-purple-900 mb-2">🔧 Hardcoded Events Status</h2>
            <div id="hardcoded" class="space-y-2"></div>
          </div>

          <!-- Time Format Analysis -->
          <div class="border-l-4 border-orange-500 bg-orange-50 p-4">
            <h2 class="text-xl font-bold text-orange-900 mb-2">🕐 Time Format Analysis</h2>
            <div id="formats" class="space-y-4"></div>
          </div>

          <!-- All Events -->
          <div class="border-l-4 border-green-500 bg-green-50 p-4">
            <h2 class="text-xl font-bold text-green-900 mb-2">📋 All Events</h2>
            <div id="events" class="overflow-x-auto"></div>
          </div>

          <!-- Raw JSON -->
          <div class="border-l-4 border-gray-500 bg-gray-50 p-4">
            <h2 class="text-xl font-bold text-gray-900 mb-2">📄 Raw JSON</h2>
            <button onclick="toggleJson()" class="text-sm text-blue-600 hover:underline mb-2">
              Show/Hide Raw Data
            </button>
            <pre id="raw-json" class="hidden bg-gray-900 text-green-400 p-4 rounded overflow-auto text-xs max-h-96"></pre>
          </div>
        </div>
      </div>

      <div id="error" class="hidden border-l-4 border-red-500 bg-red-50 p-4">
        <h2 class="text-xl font-bold text-red-900 mb-2">❌ Error</h2>
        <pre id="error-message" class="text-red-700 text-sm"></pre>
      </div>
    </div>
  </div>

  <script>
    let diagnosticData = null;

    async function runDiagnostic() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('results').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');

      try {
        const response = await fetch('/.netlify/functions/diagnostic-events');
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Diagnostic failed');
        }

        diagnosticData = data;
        displayResults(data);
        
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
      } catch (error) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('error-message').textContent = error.message;
      }
    }

    function displayResults(data) {
      // Summary
      const summary = data.summary;
      document.getElementById('summary').innerHTML = `
        <div><strong>Total Events:</strong> ${summary.totalEvents}</div>
        <div><strong>Published:</strong> ${summary.publishedEvents}</div>
        <div><strong>Unpublished:</strong> ${summary.unpublishedEvents}</div>
        <div><strong>With Time:</strong> ${summary.eventsWithTime}</div>
        <div><strong>With End Time:</strong> ${summary.eventsWithEndTime}</div>
        <div><strong class="text-red-600">Missing Time:</strong> ${summary.eventsWithMissingTime}</div>
      `;

      // Hardcoded status
      const hardcoded = data.hardcodedEventStatus;
      document.getElementById('hardcoded').innerHTML = `
        <div><strong>Hardcoded in admin.html:</strong> ${hardcoded.totalHardcodedEvents} events</div>
        <div><strong class="text-green-600">In Production:</strong> ${hardcoded.hardcodedInProduction}</div>
        <div><strong class="text-red-600">NOT in Production:</strong> ${hardcoded.hardcodedNotInProduction}</div>
        ${hardcoded.missingEventIds.length > 0 ? `
          <div class="mt-2 p-2 bg-red-100 rounded">
            <strong>Missing IDs:</strong> ${hardcoded.missingEventIds.join(', ')}
          </div>
        ` : ''}
      `;

      // Time formats
      const formats = data.timeFormatAnalysis;
      document.getElementById('formats').innerHTML = `
        <div>
          <strong>Start Time Formats Found:</strong> ${formats.uniqueStartFormats}
          <div class="mt-2 bg-white p-3 rounded border">
            ${Object.entries(formats.startTimeFormats).map(([format, count]) => `
              <div class="flex justify-between py-1">
                <code class="text-sm">"${format}"</code>
                <span class="text-gray-600">${count} events</span>
              </div>
            `).join('')}
          </div>
        </div>
        <div>
          <strong>End Time Formats Found:</strong> ${formats.uniqueEndFormats}
          <div class="mt-2 bg-white p-3 rounded border">
            ${Object.entries(formats.endTimeFormats).map(([format, count]) => `
              <div class="flex justify-between py-1">
                <code class="text-sm">"${format}"</code>
                <span class="text-gray-600">${count} events</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      // Events table
      document.getElementById('events').innerHTML = `
        <table class="min-w-full bg-white border text-sm">
          <thead class="bg-gray-100">
            <tr>
              <th class="border px-4 py-2">ID</th>
              <th class="border px-4 py-2">Title</th>
              <th class="border px-4 py-2">Start Time</th>
              <th class="border px-4 py-2">End Time</th>
              <th class="border px-4 py-2">Published</th>
            </tr>
          </thead>
          <tbody>
            ${data.allEvents.map(event => `
              <tr>
                <td class="border px-4 py-2">${event.id}</td>
                <td class="border px-4 py-2">${event.title}</td>
                <td class="border px-4 py-2">
                  <code class="${event.time === 'MISSING' ? 'text-red-600' : ''}">${event.time}</code>
                </td>
                <td class="border px-4 py-2">
                  <code class="text-gray-600">${event.endTime}</code>
                </td>
                <td class="border px-4 py-2 text-center">
                  ${event.published ? '✅' : '⬜'}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      // Raw JSON
      document.getElementById('raw-json').textContent = JSON.stringify(data, null, 2);
    }

    function toggleJson() {
      document.getElementById('raw-json').classList.toggle('hidden');
    }
  </script>
</body>
</html>
