<body>
  <div id="root"></div>
  
  <!-- Load React libraries before inline script -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Build10.14.8.3: Version loaded from single source — build-version.js -->
  <!-- Build10.15: Inline version added as CDN-proof display source -->
  <!-- build-version.js still loaded for sw.js importScripts compatibility -->
  <script src="/build-version.js"></script>
  <script>
    // Build10.15: Inline version — immune to CDN caching of build-version.js
    // This MUST match build-version.js. Version Gate Script enforces this.
    var BUILD_VERSION = 'v2.3.1-Build10.37';
    var BUILD_DATE = '2026-03-07';
  </script>
  
  <script>
    // Check if React and ReactDOM loaded successfully
    if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
      document.getElementById('root').innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif;"><h2 style="color:#dc2626;">Error Loading Application</h2><p>React libraries failed to load. Please check your internet connection and refresh the page.</p><p style="font-size:12px;color:#666;margin-top:20px;">If this error persists, try clearing your browser cache.</p></div>';
      throw new Error('React or ReactDOM not loaded');
    }
    
    const {useState,useEffect,useMemo}=React;
    const {createRoot}=ReactDOM;
    const e=React.createElement;

    // BUILD_VERSION set inline above (Build10.15: CDN-proof version display)

    // Function to render formatted text
    const renderFormatted=(text)=>{
      if(!text)return '';
      let formatted=text;
      formatted=formatted.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
      formatted=formatted.replace(/\*(.+?)\*/g,'<em>$1</em>');
      formatted=formatted.replace(/\n/g,'<br>');
      return formatted;
    };

    // Build10.32: Render HTML fields (featuring/program) without double-processing
    // contentEditable stores HTML; if it already contains block-level tags,
    // skip the \n→<br> substitution that renderFormatted does for plain-text fields.
    const renderHTMLField=(html)=>{
      if(!html)return '';
      if(/<(p|div|ul|ol|br|h[1-6])\b/i.test(html))return html;
      return renderFormatted(html);
    };

    // Build10.34: Check if HTML field has actual visible text (not just residual tags like <br>)
    const hasContent=(html)=>html&&html.replace(/<[^>]*>/g,'').replace(/&nbsp;/g,'').trim().length>0;

    // Build80: Calendar preview hover delay configuration
    // Allows mouse travel from event bar to preview window without disappearing
    const CALENDAR_PREVIEW_HOVER_DELAY = 200; // milliseconds

    // URL Routing Functions (v2.2.0 Build 6)
    const generateSlug=(title,id,date)=>{
      const slug=title
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g,'-')
        .replace(/^-+|-+$/g,'');
      // Date-first format: YYYY-MM-DD-slug-id
      if(date){
        return `${date}-${slug}-${id}`;
      }
      return `${slug}-${id}`;
    };

    const extractEventIdFromPath=(path)=>{
      if(!path.startsWith('/events/'))return null;
      const slug=path.split('/events/')[1];
      const parts=slug.split('-');
      const id=parts[parts.length-1];
      return id;
    };

    const detectNavigationType=()=>{
      const ref=document.referrer;
      if(!ref)return'external';
      if(ref===window.location.origin+'/'||ref===window.location.origin)return'internal';
      return'external';
    };

    // Analytics Helper Functions (v2.2.0 Build 5)
    const analytics = {
      // Track event card click on homepage
      trackEventCardClick: (event, position) => {
        if(typeof gtag === 'function'){
          gtag('event', 'select_content', {
            content_type: 'event_card',
            content_id: event.id,
            item_name: event.title,
            card_position: position
          });
          console.log('📊 Tracked: Event card click -', event.title, '(position:', position + ')');
        }
      },
      
      // Track event page view (dedicated event page)
      trackEventPageView: (event) => {
        if(typeof gtag === 'function'){
          gtag('event', 'view_item', {
            item_id: event.id,
            item_name: event.title,
            item_category: 'event',
            item_brand: event.performer || 'Grant Park Music Festival'
          });
          console.log('📊 Tracked: Event page view -', event.title);
        }
      },
      
      // Track add to calendar button click
      trackAddToCalendar: (event, platform, location='unknown') => {
        if(typeof gtag === 'function'){
          gtag('event', 'add_to_calendar', {
            event_title: event.title,
            event_id: event.id,
            calendar_type: platform,
            calendar_location: location,
            event_date: event.date
          });
          console.log('📊 Tracked: Add to calendar -', platform, '- location:', location, '-', event.title);
        }
      },
      
      // Track view toggle (Card ↔ Calendar)
      trackViewToggle: (fromView, toView) => {
        if(typeof gtag === 'function'){
          gtag('event', 'view_toggle', {
            from_view: fromView,
            to_view: toView
          });
          console.log('📊 Tracked: View toggle -', fromView, '→', toView);
        }
      },
      
      // Track modal open
      trackModalOpen: (event, source) => {
        if(typeof gtag === 'function'){
          gtag('event', 'open_modal', {
            event_title: event.title,
            event_id: event.id,
            source: source
          });
          console.log('📊 Tracked: Modal open -', event.title, '(from:', source + ')');
        }
      },
      
      // Track enhanced event view with full details (v2.2.3.6)
      trackEventView: (event) => {
        if(typeof gtag === 'function'){
          gtag('event', 'view_event', {
            event_title: event.title,
            event_date: event.date, // YYYY-MM-DD format for GA4 reporting
            event_time: event.time || '',
            event_performer: event.performer || '',
            event_location: event.location || '',
            event_id: event.id
          });
          console.log('📊 Tracked: Enhanced event view -', event.title, '- Date:', event.date);
        }
      },
      
      // Track PDF download/view
      trackPDFView: (event, pdfUrl) => {
        if(typeof gtag === 'function'){
          gtag('event', 'file_download', {
            file_name: pdfUrl.split('/').pop(),
            file_extension: 'pdf',
            event_title: event.title,
            event_id: event.id
          });
          console.log('📊 Tracked: PDF view -', event.title);
        }
      },
      
      // Track More Info button click
      trackMoreInfo: (event, url) => {
        if(typeof gtag === 'function'){
          gtag('event', 'click_more_info', {
            event_title: event.title,
            event_id: event.id,
            destination_url: url
          });
          console.log('📊 Tracked: More Info click -', event.title);
        }
      },
      
      // Track outbound link click
      trackOutboundLink: (url, sourceEvent) => {
        if(typeof gtag === 'function'){
          gtag('event', 'click_outbound', {
            link_url: url,
            link_domain: new URL(url).hostname,
            source_event: sourceEvent || 'homepage'
          });
          console.log('📊 Tracked: Outbound link -', url);
        }
      },
      
      // Track popup display
      trackPopupDisplay: () => {
        if(typeof gtag === 'function'){
          gtag('event', 'popup_displayed', {
            popup_type: 'email_signup'
          });
          console.log('📊 Tracked: Popup displayed');
        }
      },
      
      // Track popup signup success
      trackPopupSignup: (email) => {
        if(typeof gtag === 'function'){
          gtag('event', 'popup_signup', {
            popup_type: 'email_signup',
            method: 'popup'
          });
          console.log('📊 Tracked: Popup signup success');
        }
      },
      
      // Track calendar toggle (renamed from view_toggle for clarity)
      trackCalendarToggle: (toView) => {
        if(typeof gtag === 'function'){
          gtag('event', 'calendar_toggle', {
            toggle_to: toView
          });
          console.log('📊 Tracked: Calendar toggle to', toView);
        }
      },
      
      // Track social share
      trackShare: (event, method) => {
        if(typeof gtag === 'function'){
          gtag('event', 'share_event', {
            method: method, // 'email', 'facebook', 'twitter', 'copy_link', 'native'
            event_title: event.title,
            event_date: event.date,
            event_id: event.id,
            content_type: 'event',
            item_id: generateSlug(event.title, event.id, event.date)
          });
          console.log('📊 Tracked: Share event -', method, '-', event.title);
        }
      }
    };


    // Chicago 6-point star SVG component
    const ChicagoStar=({size=24,color="#d32f2f"})=>{
      const r=size/2,ir=r*0.382,pts=[];
      for(let i=0;i<12;i++){
        const rad=(i*30-90)*Math.PI/180;
        const radius=i%2===0?r:ir;
        pts.push(`${size/2+radius*Math.cos(rad)},${size/2+radius*Math.sin(rad)}`);
      }
      return e('svg',{width:size,height:size,viewBox:`0 0 ${size} ${size}`,style:{display:'inline-block'}},e('polygon',{points:pts.join(' '),fill:color,stroke:'none'}));
    };

    // Feature flag for social share
    const ENABLE_SHARE = true;

    // Share Icon Component - Upload/Share icon with hover-aware circle styling
    const ShareIcon = ({ size = 20, isHovered = false }) => {
      const circleSize = size * 1.4; // White circle slightly larger than icon
      return e('svg', {
        width: circleSize,
        height: circleSize,
        viewBox: '0 0 28 28',
        xmlns: 'http://www.w3.org/2000/svg',
        style: { 
          display: 'inline-block', 
          verticalAlign: 'middle',
          filter: 'drop-shadow(0 2px 8px rgba(0,0,0,0.1))',
          transition: 'all 0.2s'
        }
      },
        // White circular background with hover states
        e('circle', { 
          cx: 14, 
          cy: 14, 
          r: 13, 
          fill: isHovered ? '#eff6ff' : '#FFFFFF', 
          stroke: isHovered ? '#60a5fa' : '#d1d5db', 
          strokeWidth: 1,
          style: { transition: 'all 0.2s' }
        }),
        // Upload/Share icon in blue (#2563eb)
        e('g', { 
          fill: 'none', 
          stroke: '#2563eb', 
          strokeWidth: 1.5, 
          strokeLinecap: 'round', 
          strokeLinejoin: 'round', 
          transform: 'translate(8, 7)' 
        },
          // Box/container
          e('path', { d: 'M1 9 L1 11 C1 11.5 1.5 12 2 12 L10 12 C10.5 12 11 11.5 11 11 L11 9' }),
          // Arrow shaft
          e('line', { x1: 6, y1: 8, x2: 6, y2: 0 }),
          // Arrow head
          e('polyline', { points: '3,3 6,0 9,3' })
        )
      );
    };


    // Share Popup Component
    const SharePopup = ({ event, onClose, position }) => {
      const [copySuccess, setCopySuccess] = useState(false);
      
      const eventUrl = `https://www.grantparkevents.com/events/${generateSlug(event.title, event.id, event.date)}`;
      
      // Format event details for email/sharing
      const formatDate = (dateStr) => {
        const date = new Date(dateStr + 'T00:00:00');
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        return `${days[date.getDay()]}, ${months[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
      };
      
      const shareViaEmail = () => {
        const subject = encodeURIComponent(`UPCOMING: ${event.title}`);
        const body = encodeURIComponent(
          `Here's an upcoming event in Grant Park:\n\n` +
          `Event: ${event.title}\n` +
          `Date: ${formatDate(event.date)}\n` +
          `Time: ${event.time}\n` +
          `Location: ${event.location || 'Millennium Park | Jay Pritzker Pavilion'}\n\n` +
          `View full details: ${eventUrl}`
        );
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
        analytics.trackShare(event, 'email');
        onClose();
      };
      
      const shareViaFacebook = () => {
        const shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(eventUrl)}`;
        window.open(shareUrl, 'facebook-share', 'width=600,height=400');
        analytics.trackShare(event, 'facebook');
        onClose();
      };
      
      const shareViaTwitter = () => {
        const text = encodeURIComponent(
          `Check out this event in Grant Park: ${event.title}\n` +
          `${formatDate(event.date)} at ${event.time}`
        );
        const shareUrl = `https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(eventUrl)}`;
        window.open(shareUrl, 'twitter-share', 'width=600,height=400');
        analytics.trackShare(event, 'twitter');
        onClose();
      };
      
      const copyToClipboard = async () => {
        try {
          await navigator.clipboard.writeText(eventUrl);
          setCopySuccess(true);
          analytics.trackShare(event, 'copy_link');
          
          // Auto-close after 2 seconds
          setTimeout(() => {
            onClose();
          }, 2000);
        } catch (err) {
          // Fallback for older browsers
          const textArea = document.createElement('textarea');
          textArea.value = eventUrl;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);
          setCopySuccess(true);
          analytics.trackShare(event, 'copy_link');
          
          setTimeout(() => {
            onClose();
          }, 2000);
        }
      };
      
      // Platform icons as SVG data URIs
      const emailIcon = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23666"%3E%3Cpath d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/%3E%3C/svg%3E';
      const facebookIcon = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%231877F2"%3E%3Cpath d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/%3E%3C/svg%3E';
      const twitterIcon = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23000000"%3E%3Cpath d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/%3E%3C/svg%3E';
      const linkIcon = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23666"%3E%3Cpath d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/%3E%3C/svg%3E';
      
      return e('div', {
        className: 'fixed inset-0 z-40',
        onClick: onClose
      },
        e('div', {
          className: 'absolute bg-white rounded-lg shadow-xl border border-gray-200 py-2 min-w-[200px]',
          style: {
            top: position.top,
            left: position.left,
            transform: 'scale(1)',
            transformOrigin: 'top left',
            animation: 'scaleIn 0.2s ease-out'
          },
          onClick: (e) => e.stopPropagation()
        },
          // Close button
          e('button', {
            onClick: onClose,
            className: 'absolute top-1 right-1 text-gray-400 hover:text-gray-600 w-6 h-6 flex items-center justify-center'
          }, '×'),
          
          // Email
          e('button', {
            onClick: shareViaEmail,
            className: 'w-full px-4 py-3 hover:bg-gray-50 flex items-center gap-3 transition-colors'
          },
            e('img', { src: emailIcon, className: 'w-5 h-5' }),
            e('span', { className: 'text-sm font-medium text-gray-700' }, 'Email')
          ),
          
          // Facebook
          e('button', {
            onClick: shareViaFacebook,
            className: 'w-full px-4 py-3 hover:bg-gray-50 flex items-center gap-3 transition-colors'
          },
            e('img', { src: facebookIcon, className: 'w-5 h-5' }),
            e('span', { className: 'text-sm font-medium text-gray-700' }, 'Facebook')
          ),
          
          // X (Twitter)
          e('button', {
            onClick: shareViaTwitter,
            className: 'w-full px-4 py-3 hover:bg-gray-50 flex items-center gap-3 transition-colors'
          },
            e('img', { src: twitterIcon, className: 'w-5 h-5' }),
            e('span', { className: 'text-sm font-medium text-gray-700' }, 'X (Twitter)')
          ),
          
          // Copy Link
          e('button', {
            onClick: copyToClipboard,
            className: `w-full px-4 py-3 hover:bg-gray-50 flex items-center gap-3 transition-colors ${copySuccess ? 'bg-green-50' : ''}`,
            disabled: copySuccess
          },

      // "6:30 PM" → 18.5, "7:00 AM" → 7.0
      const parseTime=(timeStr)=>{

        const match=timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
        if(!match)return 0;
        
        let hour=parseInt(match[1]);
        const minute=parseInt(match[2]);
        const period=match[3].toUpperCase();
        
        if(period==='PM'&&hour!==12)hour+=12;
        if(period==='AM'&&hour===12)hour=0;
        
        return hour+(minute/60);

      const getCalUrl=(ev,type)=>{
        // Parse event time or default to 6:00 PM
        let startHour = 18;
        let startMinute = 0;
        
        if (ev.time) {
          const match = ev.time.match(/(\d+):(\d+)\s*(AM|PM)/i);
          if (match) {
            startHour = parseInt(match[1]);
            startMinute = parseInt(match[2]);
            const period = match[3].toUpperCase();
            
            if (period === 'PM' && startHour !== 12) startHour += 12;
            if (period === 'AM' && startHour === 12) startHour = 0;
          }
        }
        
        // Create start date with actual event time
        const eventDate = parseLocalDate(ev.date);
        const start = new Date(eventDate);
        start.setHours(startHour, startMinute, 0, 0);
        
        // Calculate end time (use endTime if available, otherwise +2 hours from start)
        let end;
        if (ev.endTime) {
          const endMatch = ev.endTime.match(/(\d+):(\d+)\s*(AM|PM)/i);
          if (endMatch) {
            let endHour = parseInt(endMatch[1]);
            const endMinute = parseInt(endMatch[2]);
            const endPeriod = endMatch[3].toUpperCase();
            
            if (endPeriod === 'PM' && endHour !== 12) endHour += 12;
            if (endPeriod === 'AM' && endHour === 12) endHour = 0;
            
            end = new Date(eventDate);
            end.setHours(endHour, endMinute, 0, 0);
          } else {
            end = new Date(start.getTime() + 2 * 60 * 60 * 1000);
          }
        } else {
          // Default: 2 hours after start
          end = new Date(start.getTime() + 2 * 60 * 60 * 1000);
        }
        
        const fmt=(d)=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
        const calTitle=ev.performer?`${ev.performer} - ${ev.title}`:ev.title;
        
        // Build description with Featuring and Program
        let description = ev.description || '';
        
        if (hasContent(ev.featuring)) {
          description += (description ? '\n\n' : '') + 'Featuring:\n' + ev.featuring;
        }
        
        if (hasContent(ev.program)) {
          description += (description ? '\n\n' : '') + 'Program:\n' + ev.program;
        }
        
        if(type==='google')return`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(calTitle)}&dates=${fmt(start)}/${fmt(end)}&details=${encodeURIComponent(description)}&location=${encodeURIComponent(ev.venue)}`;
        if(type==='apple')return'data:text/calendar;charset=utf-8,'+encodeURIComponent(`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${calTitle}\nDTSTART:${fmt(start)}\nDTEND:${fmt(end)}\nDESCRIPTION:${description}\nLOCATION:${ev.venue}\nEND:VEVENT\nEND:VCALENDAR`);
        if(type==='outlook')return`https://outlook.live.com/calendar/0/deeplink/compose?subject=${encodeURIComponent(calTitle)}&startdt=${fmt(start)}&enddt=${fmt(end)}&body=${encodeURIComponent(description)}&location=${encodeURIComponent(ev.venue)}`;
      };

    // Email Popup Component - Phase 1
    const EmailPopup = () => {
      const [showPopup, setShowPopup] = useState(false);
      const [email, setEmail] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitted, setSubmitted] = useState(false);
      const [settings, setSettings] = useState(null);
      
      // Cookie helpers
      const getCookie = (name) => {
        return document.cookie.split('; ').reduce((r, v) => {
          const parts = v.split('=');
          return parts[0] === name ? decodeURIComponent(parts[1]) : r;
        }, '');
      };
      
      const setCookie = (name, value, days) => {
        const expires = new Date(Date.now() + days * 864e5).toUTCString();
        document.cookie = `${name}=${value}; expires=${expires}; path=/; SameSite=Lax`;
      };
      
      // Load popup settings and show popup
      // Build10.14.8.4: Fetch from Blobs endpoint (authoritative), localStorage fallback
      useEffect(() => {
        const DEFAULTS = {
          enabled: true,
          delay: 10,
          headline: "Never Miss a Concert!",
          description: "Get the week's events delivered to your inbox every Monday morning.",
          buttonText: "Get Weekly Updates",
          ignoreCookie: false
        };
        
        const initPopup = async () => {
          let popupSettings = null;
          
          // Try Blobs endpoint first (authoritative, cross-device)
          try {
            const response = await fetch('/.netlify/functions/get-popup-settings');
            if (response.ok) {
              const data = await response.json();
              if (data && data.found !== false && data.enabled !== undefined) {
                popupSettings = data;
                // Sync to localStorage for offline/faster next load
                localStorage.setItem('gpe_popup_settings', JSON.stringify(data));
                console.log('Popup settings loaded from Blobs:', popupSettings);
              }
            }
          } catch (err) {
            console.log('Blobs fetch failed, trying localStorage:', err.message);
          }
          
          // Fallback: localStorage
          if (!popupSettings) {
            const saved = localStorage.getItem('gpe_popup_settings');
            if (saved) {
              popupSettings = JSON.parse(saved);
              console.log('Popup settings loaded from localStorage:', popupSettings);
            }
          }
          
          // Final fallback: defaults
          if (!popupSettings) {
            popupSettings = DEFAULTS;
            console.log('Popup settings: using defaults');
          }
          
          console.log('Delay will be:', popupSettings.delay, 'seconds');
          setSettings(popupSettings);
          
          // Check if popup should be shown
          if (!popupSettings.enabled) {
            console.log('Popup disabled in settings');
            return;
          }
          
          // Check cookie (unless testing mode)
          const hasSeenPopup = getCookie('gpe_popup_seen');
          if (hasSeenPopup && !popupSettings.ignoreCookie) {
            console.log('Popup already seen (cookie exists)');
            return;
          }
          
          // Show popup after delay
          console.log('Popup will show in', popupSettings.delay, 'seconds');
          const timer = setTimeout(() => {
            console.log('Showing popup now');
            setShowPopup(true);
            analytics.trackPopupDisplay();
          }, popupSettings.delay * 1000);
          
          // Store cleanup ref
          window._popupTimer = timer;
        };
        
        initPopup();
        return () => { if (window._popupTimer) clearTimeout(window._popupTimer); };
      }, []);
      
      // Handle email submission
      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!email || isSubmitting) return;
        
        console.log('[SIGNUP] User submitted popup form:', {
          email: email,
          source: 'Pop-Up',
          timestamp: new Date().toISOString()
        });
        
        setIsSubmitting(true);
        
        try {
          const response = await fetch('/.netlify/functions/subscribe-mailerlite', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              email,
              source: 'Pop-Up'
            })
          });
          
          const data = await response.json();
          
          console.log('[SIGNUP] Received response:', {
            status: response.status,
            ok: response.ok,
            data: data
          });
          
          if (response.ok && data.success) {
            console.log('[SIGNUP] ✅ Success - User subscribed via Pop-Up');
            setSubmitted(true);
            analytics.trackPopupSignup(email); // Track successful signup
            setCookie('gpe_popup_seen', 'true', 30); // 30 days
            // Do NOT auto-close - user must manually close
          } else {
            console.log('[SIGNUP] ❌ Error:', data.error || data.details);
            alert(data.details || 'There was an error subscribing. Please try again.');
            setIsSubmitting(false);
          }
        } catch (error) {
          console.error('[ERROR] Email subscription exception:', error);
          alert('There was an error subscribing. Please try again.');
          setIsSubmitting(false);
        }
      };
      
      // Close popup
      const closePopup = () => {
        if(typeof gtag === 'function'){
          gtag('event','popup_close',{
            popup_type:'email_signup'
          });
        }
        setShowPopup(false);
        if (!settings?.ignoreCookie) {
          setCookie('gpe_popup_seen', 'true', 30); // 30 days
        }
      };
      
      if (!showPopup || !settings) return null;
      
      return e('div', {
        className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[9999]',
        style: { animation: 'fadeIn 0.3s ease-in' }
      },
        e('div', {
          className: 'bg-white rounded-2xl max-w-md w-full shadow-2xl relative pt-16',
          onClick: (e) => e.stopPropagation()
        },
          // Star at top center - inside modal with padding
          e('div', {
            className: 'absolute top-4 left-1/2 transform -translate-x-1/2'
          },
            e(ChicagoStar, { size: 60, color: '#d32f2f', style: { opacity: '1' } })
          ),
          
          // Close button
          e('button', {
            onClick: closePopup,
            className: 'absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl font-bold w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition-all',
            'aria-label': 'Close'
          }, '×'),
          
          // Content
          e('div', { className: 'p-8 pt-5' },
            // Headline (centered)
            e('h2', { className: 'text-3xl font-bold text-gray-900 mb-3 text-center' }, 
              settings.headline
            ),
            
            // Description
            e('p', { className: 'text-gray-600 mb-6 text-lg' }, 
              settings.description
            ),
            
            // Success message
            submitted ? e('div', {
              className: 'bg-green-50 border-2 border-green-500 rounded-lg p-4 text-center'
            },
              e('div', { className: 'text-4xl mb-2' }, '✓'),
              e('p', { className: 'text-green-800 font-semibold' }, 'Success!')
            ) : 
            // Email form
            e('form', { onSubmit: handleSubmit },
              e('div', { className: 'flex flex-col gap-3' },
                e('input', {
                  type: 'email',
                  value: email,
                  onChange: (e) => setEmail(e.target.value),
                  placeholder: 'your@email.com',
                  required: true,
                  className: 'flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-red-500 focus:outline-none text-lg',
                  disabled: isSubmitting
                }),
                e('button', {
                  type: 'submit',
                  disabled: isSubmitting,
                  className: `px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition-all ${isSubmitting ? 'opacity-50 cursor-not-allowed' : ''}`
                }, isSubmitting ? 'Sending...' : settings.buttonText)
              ),
              e('p', { className: 'text-xs text-gray-500 mt-3 text-center' },
                'We respect your privacy. Unsubscribe anytime.'
              )
            )
          )
        )
      );
    };

    console.log('✓ Grant Park Events initializing...');
    console.log('React:',typeof React,'ReactDOM:',typeof ReactDOM);
    createRoot(document.getElementById('root')).render(e(App));
    console.log('✓ Grant Park Events loaded with 20 GPMF events');
  </script>

  <script>
    // Register service worker for PWA functionality
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('[PWA] Service Worker registered:', registration.scope);
            
            // Check for updates every hour
            setInterval(() => {
              registration.update();
            }, 60 * 60 * 1000);
            
            // Listen for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              console.log('[PWA] Update found, installing new version...');
              
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New version available
                  console.log('[PWA] New version ready');
                  
                  // Show update notification (optional - can be customized)
                  if (confirm('New version available! Reload to update?')) {
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                    window.location.reload();
                  }
                }
              });
            });
          })
          .catch((error) => {
            console.error('[PWA] Service Worker registration failed:', error);
          });
        
        // Handle service worker updates
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      });
    }
    
    // PWA install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent automatic install prompt
      e.preventDefault();
      deferredPrompt = e;
      console.log('[PWA] Install prompt available');
      
      // You can add a custom install button here in future builds
      // For now, browser will show default install UI when appropriate
    });
    
    // Track PWA install
    window.addEventListener('appinstalled', () => {
      console.log('[PWA] App installed successfully');
      deferredPrompt = null;
      
      // Track install with Google Analytics
      if (typeof gtag !== 'undefined') {
        gtag('event', 'pwa_install', {
          'event_category': 'engagement',
          'event_label': 'PWA Installed'
        });
      }
