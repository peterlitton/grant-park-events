  <style>

<body class="bg-gray-50">
  
  <!-- Authentication Check -->
  <script>
    // Check if user is authenticated
    (function() {
      const isAuthenticated = sessionStorage.getItem('gpe_admin_auth') === 'authenticated';
      const loginTime = sessionStorage.getItem('gpe_admin_time');
      const currentTime = Date.now();
      const EIGHT_HOURS = 8 * 60 * 60 * 1000; // 8 hours in milliseconds
      
      // Check if session expired (8 hours)
      if (isAuthenticated && loginTime && (currentTime - loginTime > EIGHT_HOURS)) {
        sessionStorage.clear();
        window.location.href = 'admin-login.html';
        return;
      }
      
      // Redirect to login if not authenticated
      if (!isAuthenticated) {
        window.location.href = 'admin-login.html';
      }
    })();
  </script>

  <div id="root">
    <div class="flex items-center justify-center h-screen">
      <div class="text-center">

  <!-- Build10.14.8.3: Version loaded from single source — build-version.js -->
  <!-- Build10.15: Inline version added as CDN-proof display source -->
  <script src="/build-version.js"></script>
  <script>
    // Build10.15: Inline version — immune to CDN caching of build-version.js

    var BUILD_VERSION = 'v2.3.1-Build10.33.3';

  <script>
    const { useState, useEffect, useRef, useMemo } = React;
    const { createRoot } = ReactDOM;
    
    // BUILD_VERSION set inline above (Build10.15: CDN-proof version display)
    
    // Build10.13: Generate URL slug for event pages (matches index.html implementation)
    const generateSlug=(title,id,date)=>{
      const slug=title
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g,'-')
        .replace(/^-+|-+$/g,'');
      // Date-first format: YYYY-MM-DD-slug-id
      if(date){
        return `${date}-${slug}-${id}`;
      }
      return `${slug}-${id}`;
    };
    
    // WYSIWYG Formatting Toolbar Component for Event Admin Fields ONLY
    // Build10.27.1: Link modal replaces prompt() for add/edit/remove links
    const EventFieldToolbar = ({ targetRef }) => {
      const [linkModal, setLinkModal] = React.useState(null); // null or {url, isEdit, savedRange}
      
      const applyFormat = (command, value = null) => {
        const editor = targetRef.current;
        if (!editor) return;
        
        editor.focus();
        
        // For list commands, ensure there's a selection or cursor position
        if (command === 'insertUnorderedList' || command === 'insertOrderedList') {
          const selection = window.getSelection();
          if (!selection.rangeCount) {
            // No selection, place cursor at end
            const range = document.createRange();
            range.selectNodeContents(editor);
            range.collapse(false);
            selection.removeAllRanges();
            selection.addRange(range);
          }
        }
        
        document.execCommand(command, false, value);
        editor.focus(); // Maintain focus after command
      };
      
      const openLinkModal = (e) => {
        e.preventDefault();
        const selection = window.getSelection();
        if (!selection.rangeCount) return;
        const savedRange = selection.getRangeAt(0).cloneRange();
        // Build10.27.2: Check for existing anchor first — cursor inside a link opens edit even without highlight
        const anchorNode = selection.anchorNode;
        const anchor = anchorNode && (anchorNode.nodeType === 1 ? anchorNode.closest('a') : anchorNode.parentElement && anchorNode.parentElement.closest('a'));
        if (anchor) {
          setLinkModal({ url: anchor.href, isEdit: true, savedRange: savedRange });
        } else if (selection.isCollapsed) {
          alert('Please select text first to create a link');
          return;
        } else {
          setLinkModal({ url: '', isEdit: false, savedRange: savedRange });
        }
      };
      
      const restoreSelection = (range) => {
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      };
      
      const handleSaveLink = () => {
        if (!linkModal || !linkModal.url.trim()) return;
        restoreSelection(linkModal.savedRange);
        if (linkModal.isEdit) {
          const anchor = window.getSelection().anchorNode.parentElement.closest('a');
          if (anchor) anchor.href = linkModal.url.trim();
        } else {
          document.execCommand('createLink', false, linkModal.url.trim());
        }
        setLinkModal(null);
        targetRef.current && targetRef.current.focus();
      };
      
      const handleRemoveLink = () => {
        if (!linkModal) return;
        restoreSelection(linkModal.savedRange);
        document.execCommand('unlink', false, null);
        setLinkModal(null);
        targetRef.current && targetRef.current.focus();
      };
      
      const handleCancelLink = () => {
        setLinkModal(null);
        targetRef.current && targetRef.current.focus();
      };
      
      return React.createElement(React.Fragment, null,
        React.createElement('div', { 
          className: 'flex flex-wrap gap-1 mb-2 p-2 bg-gray-50 rounded border border-gray-300' 
        },
          React.createElement('button', {
            type: 'button',
            onMouseDown: (e) => { e.preventDefault(); applyFormat('bold'); },
            className: 'px-3 py-1 bg-white border border-gray-300 rounded hover:bg-gray-50 font-bold text-sm',
            title: 'Bold'
          }, 'B'),
          React.createElement('button', {
            type: 'button',
            onMouseDown: (e) => { e.preventDefault(); applyFormat('italic'); },
            className: 'px-3 py-1 bg-white border border-gray-300 rounded hover:bg-gray-50 italic text-sm',
            title: 'Italic'
          }, 'I'),
          React.createElement('button', {
            type: 'button',
            onMouseDown: (e) => { e.preventDefault(); applyFormat('insertUnorderedList'); },
            className: 'px-3 py-1 bg-white border border-gray-300 rounded hover:bg-gray-50 text-sm',
            title: 'Bullet List'
          }, '• List'),
          React.createElement('button', {
            type: 'button',
            onMouseDown: (e) => { e.preventDefault(); applyFormat('insertOrderedList'); },
            className: 'px-3 py-1 bg-white border border-gray-300 rounded hover:bg-gray-50 text-sm',
            title: 'Numbered List'
          }, '1. List'),
          React.createElement('button', {
            type: 'button',
            onMouseDown: openLinkModal,
            className: 'px-3 py-1 bg-white border border-gray-300 rounded hover:bg-gray-50 text-sm text-blue-600',
            title: 'Add/Edit Link'
          }, '🔗 Link'),
          React.createElement('span', { className: 'text-xs text-gray-500 self-center ml-2' },
            'Select text and click to format'
          )
        ),
        // Link Modal
        linkModal && React.createElement('div', {
          className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[9999]',
          onClick: handleCancelLink
        },
          React.createElement('div', {
            className: 'bg-white rounded-xl shadow-2xl p-6 w-full max-w-md mx-4',
            onClick: (e) => e.stopPropagation()
          },
            React.createElement('h3', { className: 'text-lg font-bold text-gray-800 mb-4' },
              linkModal.isEdit ? 'Edit Link' : 'Add Link'
            ),
            React.createElement('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'URL'),
            React.createElement('input', {
              type: 'text',
              value: linkModal.url,
              onChange: (e) => setLinkModal({ ...linkModal, url: e.target.value }),
              onKeyDown: (e) => { if (e.key === 'Enter') handleSaveLink(); if (e.key === 'Escape') handleCancelLink(); },
              placeholder: 'https://example.com',
              autoFocus: true,
              className: 'w-full px-4 py-3 border-2 rounded-lg focus:border-blue-500 focus:outline-none mb-4'
            }),
            React.createElement('div', { className: 'flex justify-between items-center' },
              linkModal.isEdit
                ? React.createElement('button', {
                    type: 'button',
                    onClick: handleRemoveLink,
                    className: 'px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg font-medium text-sm'
                  }, 'Remove Link')
                : React.createElement('div'),
              React.createElement('div', { className: 'flex gap-2' },
                React.createElement('button', {
                  type: 'button',
                  onClick: handleCancelLink,
                  className: 'px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-medium text-sm'
                }, 'Cancel'),
                React.createElement('button', {
                  type: 'button',
                  onClick: handleSaveLink,
                  className: 'px-4 py-2 bg-blue-600 text-white hover:bg-blue-700 rounded-lg font-medium text-sm'
                }, 'Save Link')
              )
            )
          )
        )
      );
    };

    // Paste cleaning function - strips unwanted formatting but keeps bold/italic/lists
    const cleanPastedHTML = (html) => {
      // Create temporary div to parse HTML
      const temp = document.createElement('div');
      temp.innerHTML = html;
      
      // Allowed tags (keep these)
      const allowedTags = ['STRONG', 'B', 'EM', 'I', 'UL', 'OL', 'LI', 'BR', 'P', 'A'];
      
      // Process all elements recursively
      const processNode = (node) => {
        if (node.nodeType === 3) return; // Text node, keep as-is
        
        if (node.nodeType === 1) { // Element node
          const children = Array.from(node.childNodes);
          
          if (!allowedTags.includes(node.tagName)) {
            // Not allowed - replace element with its children
            children.forEach(child => {
              node.parentNode.insertBefore(child, node);
            });
            node.remove();
            // Process moved children
            children.forEach(child => processNode(child));
          } else {
            // Allowed tag - remove all attributes except href on A tags (Build10.27)
            const href = node.tagName === 'A' ? node.getAttribute('href') : null;
            while (node.attributes.length > 0) {
              node.removeAttribute(node.attributes[0].name);
            }
            if (href) {
              node.setAttribute('href', href);
              node.setAttribute('target', '_blank');
            }
            // Process children
            children.forEach(child => processNode(child));
          }
        }
      };
      
      // Process all top-level nodes
      Array.from(temp.childNodes).forEach(processNode);
      
      return temp.innerHTML;
    };

    // Strip HTML tags from text (for preview snippets)
    const stripHTML = (html) => {
      if (!html) return '';
      const temp = document.createElement('div');
      temp.innerHTML = html;
      return temp.textContent || temp.innerText || '';
    };

    // Image URL helper - converts various image path formats to absolute URLs
    // Build10.17: Removed assets/events/ branch (all images migrated to Blobs)
    const getAbsoluteImageUrl = (imgPath) => {
      if (!imgPath) return window.location.origin + '/assets/star.png';
      // If it's already an absolute URL or data URI, return as-is
      if (imgPath.startsWith('http') || imgPath.startsWith('data:')) return imgPath;
      // Support blob storage paths starting with /
      if (imgPath.startsWith('/.netlify/functions/images/')) return window.location.origin + imgPath;
      if (imgPath.startsWith('/')) return window.location.origin + imgPath;
      // Bare filename (no path) - route to blob storage
      if (!imgPath.includes('/')) {
        return window.location.origin + '/.netlify/functions/images/' + imgPath;
      }
      return window.location.origin + '/' + imgPath;
    };

    // Logout function
    const handleLogout = () => {
      if (confirm('Are you sure you want to log out?')) {
        sessionStorage.clear();
        window.location.href = 'admin-login.html';
      }
    };

    // Chicago 6-point star SVG component
    const ChicagoStar = ({ size = 24, color = "#d32f2f" }) => {
      const r = size / 2;
      const ir = r * 0.382;
      const pts = [];
      for (let i = 0; i < 12; i++) {
        const rad = (i * 30 - 90) * Math.PI / 180;
        const radius = i % 2 === 0 ? r : ir;
        pts.push(`${size/2 + radius * Math.cos(rad)},${size/2 + radius * Math.sin(rad)}`);
      }
      return React.createElement('svg', { 
        width: size, 
        height: size, 
        viewBox: `0 0 ${size} ${size}`,
        style: { display: 'inline-block' }
      }, 
        React.createElement('polygon', { 
          points: pts.join(' '), 
          fill: color,
          stroke: 'none'
        })
      );
    };

    // Formatting Toolbar Component with Paste Support
    // Build10.13.13: Markdown Toolbar - inserts markdown syntax into textarea
    const MarkdownToolbar = ({ textareaRef, aboutContent, setAboutContent }) => {
      const insertMarkdown = (prefix, suffix = '') => {
        const textarea = textareaRef.current;
        if (!textarea) return;
        
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const selectedText = aboutContent.substring(start, end);
        const beforeText = aboutContent.substring(0, start);
        const afterText = aboutContent.substring(end);
        
        // Insert markdown syntax around selection
        const newText = beforeText + prefix + selectedText + suffix + afterText;
        setAboutContent(newText);
        
        // Restore focus and move cursor
        setTimeout(() => {
          textarea.focus();
          const newCursorPos = start + prefix.length + selectedText.length + suffix.length;
          textarea.setSelectionRange(newCursorPos, newCursorPos);
        }, 0);
      };

      return React.createElement('div', { className: 'flex flex-wrap gap-2 mb-3 p-3 bg-gray-100 rounded-lg border border-gray-300' },
        React.createElement('button', {
          type: 'button',
          onClick: (e) => { e.preventDefault(); insertMarkdown('**', '**'); },
          className: 'px-3 py-1 bg-white border border-gray-300 rounded hover:bg-gray-50 font-bold text-sm',
          title: 'Bold - wraps selection in **text**'
        }, 'B'),
        React.createElement('button', {
          type: 'button',
          onClick: (e) => { e.preventDefault(); insertMarkdown('*', '*'); },
          className: 'px-3 py-1 bg-white border border-gray-300 rounded hover:bg-gray-50 italic text-sm',
          title: 'Italic - wraps selection in *text*'
        }, 'I'),
        React.createElement('span', { className: 'text-xs text-gray-500 self-center ml-2' },
          'Select text and click to add markdown formatting'
        ),
        React.createElement('span', { className: 'text-xs text-gray-400 self-center ml-4' },
          '**bold** • *italic*'
        )
      );
    };


    // Function to render formatted text (converts markdown-style to HTML)
    const renderFormatted = (text) => {
      if (!text) return '';
      
      // Convert **bold** to <strong>
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Convert *italic* to <em>
      text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // Preserve line breaks
      text = text.replace(/\n/g, '<br>');
      
      return text;
    };

    // Growth Chart Component (Build8)
    const GrowthChart = ({ stats }) => {
      const [dateRange, setDateRange] = useState(30);
      const chartDivRef = useRef(null);
      
      // Filter growth data based on date range
      const filteredGrowthData = useMemo(() => {
        if (!stats?.growthData || dateRange === 'all') return stats?.growthData || [];
        
        const cutoffDate = new Date();
        cutoffDate.setDate(cutoffDate.getDate() - dateRange);
        const cutoffStr = cutoffDate.toISOString().split('T')[0];
        
        return stats.growthData.filter(d => d.date >= cutoffStr);
      }, [stats, dateRange]);
      
      // Render chart when data changes
      useEffect(() => {
        if (!filteredGrowthData || filteredGrowthData.length === 0 || !chartDivRef.current) return;
        
        const trace = {
          x: filteredGrowthData.map(d => d.date),
          y: filteredGrowthData.map(d => d.cumulative),
          type: 'scatter',
          mode: 'lines+markers',
          name: 'Total Subscribers',
          line: { color: 'rgb(59, 130, 246)', width: 3 },
          marker: { size: 6 },
          hovertemplate: '<b>%{x}</b><br>Total: %{y}<extra></extra>'
        };
        
        const layout = {
          title: {
            text: 'Subscriber Growth Over Time',
            font: { size: 20 }
          },
          xaxis: { 
            title: 'Date',
            showgrid: true,
            gridcolor: 'lightgray'
          },
          yaxis: { 
            title: 'Total Subscribers',
            showgrid: true,
            gridcolor: 'lightgray',
            rangemode: 'tozero'
          },
          hovermode: 'x unified',
          plot_bgcolor: 'white',
          paper_bgcolor: 'white',
          margin: { l: 60, r: 40, t: 60, b: 60 }
        };
        
        const config = {
          responsive: true,
          displayModeBar: true,
          displaylogo: false
        };
        
        Plotly.newPlot(chartDivRef.current, [trace], layout, config);
      }, [filteredGrowthData]);
      
      return React.createElement('div', { className: 'bg-white rounded-xl shadow-md p-6' },
        React.createElement('div', { className: 'flex justify-between items-center mb-4 flex-wrap gap-2' },
          React.createElement('h3', { className: 'text-xl font-bold' }, '📈 Subscriber Growth'),
          React.createElement('div', { className: 'flex gap-2 flex-wrap' },
            // Build10.14.8: Added 180-day preset
            [30, 60, 90, 180, 'all'].map(range =>
              React.createElement('button', {
                key: range,
                onClick: () => setDateRange(range),
                className: `px-4 py-2 rounded-lg transition ${
                  dateRange === range 
                    ? 'bg-red-600 text-white' 
                    : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                }`
              }, range === 'all' ? 'All Time' : `${range} Days`)
            )
          )
        ),
        React.createElement('div', { 
          ref: chartDivRef,
          style: { height: '400px' } 
        })
      );
    };
    
    // Source Breakdown Chart Component (Build8)
    const SourceChart = ({ stats }) => {
      const chartDivRef = useRef(null);
      
      useEffect(() => {
        if (!stats?.sourceBreakdown || !chartDivRef.current) return;
        
        const sources = Object.keys(stats.sourceBreakdown);
        const counts = Object.values(stats.sourceBreakdown);
        
        const trace = {
          labels: sources,
          values: counts,
          type: 'pie',
          marker: {
            colors: ['rgb(59, 130, 246)', 'rgb(34, 197, 94)', 'rgb(168, 85, 247)', 'rgb(156, 163, 175)']
          },
          textinfo: 'label+percent',
          textposition: 'outside',
          hovertemplate: '<b>%{label}</b><br>Count: %{value}<br>Percent: %{percent}<extra></extra>'
        };
        
        const layout = {
          title: {
            text: 'Subscriber Sources',
            font: { size: 20 }
          },
          showlegend: true,
          height: 400,
          margin: { l: 20, r: 20, t: 60, b: 20 }
        };
        
        const config = {
          responsive: true,
          displayModeBar: false
        };
        
        Plotly.newPlot(chartDivRef.current, [trace], layout, config);
      }, [stats]);
      
      return React.createElement('div', { className: 'bg-white rounded-xl shadow-md p-6' },
        React.createElement('h3', { className: 'text-xl font-bold mb-4' }, '🎯 Subscriber Sources'),
        React.createElement('div', { ref: chartDivRef })
      );
    };

    // Subscribers Tab Component (Build7.1 + Build8 + Build9 enhancements)
    const SubscribersTab = ({ stats: propsStats, loading: propsLoading, error: propsError }) => {
      // Build10.13.9: Accept pre-loaded data from AdminPanel instead of fetching
      const [stats, setStats] = useState(propsStats);
      const [loading, setLoading] = useState(propsLoading);
      const [error, setError] = useState(propsError);
      
      // Build9 - Search, Filter, Pagination state
      const [searchTerm, setSearchTerm] = useState('');
      const [sourceFilter, setSourceFilter] = useState('all');
      const [currentPage, setCurrentPage] = useState(1);
      const itemsPerPage = 50;
      
      // Build10.13.9: Update state when props change (data loaded in background)
      useEffect(() => {
        if (propsStats !== undefined) setStats(propsStats);
        if (propsLoading !== undefined) setLoading(propsLoading);
        if (propsError !== undefined) setError(propsError);
      }, [propsStats, propsLoading, propsError]);
      
      // Build10.13.9: Refresh function (manual refresh button)
      const fetchStats = async () => {
        setLoading(true);
        setError(null);
        
        try {
          const response = await fetch('/.netlify/functions/get-subscriber-stats');
          
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }
          
          const data = await response.json();
          
          if (data.error) {
            throw new Error(data.message || 'Failed to load subscriber data');
          }
          
          setStats(data);
          setLoading(false);
        } catch (err) {
          console.error('Error fetching subscriber stats:', err);
          setError(err.message);
          setLoading(false);
        }
      };
      
      // Build9 - Filter subscribers based on search and filters
      const filteredSubscribers = useMemo(() => {
        if (!stats?.recent) return [];
        
        return stats.recent.filter(sub => {
          // Search filter
          if (searchTerm && !sub.email.toLowerCase().includes(searchTerm.toLowerCase())) {
            return false;
          }
          
          // Source filter
          if (sourceFilter !== 'all' && sub.source !== sourceFilter) {
            return false;
          }
          
          return true;
        });
      }, [stats, searchTerm, sourceFilter]);
      
      // Build9 - Paginate filtered results
      const paginatedSubscribers = useMemo(() => {
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        return filteredSubscribers.slice(startIndex, endIndex);
      }, [filteredSubscribers, currentPage]);
      
      const totalPages = Math.ceil(filteredSubscribers.length / itemsPerPage);
      
      // Build9 - Reset to page 1 when filters change
      useEffect(() => {
        setCurrentPage(1);
      }, [searchTerm, sourceFilter]);
      
      // Build9 - Export to CSV function
      const exportToCSV = () => {
        const headers = ['Email', 'Source', 'Date Added', 'Status'];
        const rows = filteredSubscribers.map(sub => [
          sub.email,
          sub.source,
          sub.dateAdded,
          sub.status
        ]);
        
        const csvContent = [
          headers.join(','),
          ...rows.map(row => row.join(','))
        ].join('\n');
        
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');

      const parseLocalDate = (dateStr) => {

        const [y, m, d] = dateStr.split('-').map(Number);
        return new Date(y, m - 1, d); // month is 0-indexed
      };
      
      // Parse time string to decimal hours (v2.2.4)
      const parseTime = (timeStr) => {
        if (!timeStr) return 0;
        const match = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
        if (!match) return 0;
        
        let hour = parseInt(match[1]);
        const minute = parseInt(match[2]);
        const period = match[3].toUpperCase();
        
        if (period === 'PM' && hour !== 12) hour += 12;
        if (period === 'AM' && hour === 12) hour = 0;
        
        return hour + (minute / 60);
      };
      
      // Compare two event times (v2.2.4)
      const compareEventTimes = (timeA, timeB) => {
        if (!timeA && !timeB) return 0;
        if (!timeA) return 1;
        if (!timeB) return -1;
        return parseTime(timeA) - parseTime(timeB);
      };
      
      // Normalize time to standard format: 7:00pm (Build6.49)
      const normalizeTime = (timeStr) => {
        if (!timeStr) return '';
        
        // Remove all spaces and periods
        let normalized = timeStr.replace(/\s/g, '').replace(/\./g, '');
        
        // Convert to lowercase
        normalized = normalized.toLowerCase();
        
        // Match format: optional digits, colon, optional digits, am/pm
        const timeRegex = /^(\d{1,2}):?(\d{2})?(am|pm)$/i;
        const match = normalized.match(timeRegex);
        
        if (!match) {
          throw new Error('Invalid time format. Use format like 7:00pm or 7pm');
        }
        
        let [_, hour, minutes, period] = match;
        
        // Validate hour
        hour = parseInt(hour);
        if (hour < 1 || hour > 12) {
          throw new Error('Hour must be between 1 and 12');
        }
        
        // Add minutes if not provided
        if (!minutes) minutes = '00';
        
        // Validate minutes
        const min = parseInt(minutes);
        if (min < 0 || min > 59) {
          throw new Error('Minutes must be between 00 and 59');
        }
        
        // Return standardized format: H:MMam/pm
        return `${hour}:${minutes}${period.toLowerCase()}`;

            { name: 'about-content', path: '/.netlify/functions/get-about-content' },
            { name: 'popup-settings', path: '/.netlify/functions/get-popup-settings' }
          ];
          const results = {};
          for (const ep of endpoints) {
            const resp = await fetch(ep.path);
            if (!resp.ok) throw new Error(ep.name + ' returned ' + resp.status);
            results[ep.name] = await resp.json();
          }
          // Load JSZip from CDN on first use
          if (!window.JSZip) {
            await new Promise((resolve, reject) => {
              const s = document.createElement('script');
              s.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
              s.onload = resolve;
              s.onerror = () => reject(new Error('Failed to load JSZip'));
              document.head.appendChild(s);
            });
          }
          const zip = new window.JSZip();
          for (const [name, data] of Object.entries(results)) {
            zip.file(name + '.json', JSON.stringify(data, null, 2));
          }
          const blob = await zip.generateAsync({ type: 'blob' });
          const now = new Date();
          const pad = (n) => String(n).padStart(2, '0');
          const ts = now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate()) + '-' + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'GPE-Content-' + ts + '.zip';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(a.href);
          setBackupStatus('done');
          showNotification('Backup downloaded: GPE-Content-' + ts + '.zip');
          setTimeout(() => setBackupStatus('idle'), 4000);

      const optimizeImage = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const maxWidth = 1200;
              const maxHeight = 1200;
              
              let { width, height } = img;
              
              // Scale down if needed
              if (width > maxWidth || height > maxHeight) {
                const ratio = Math.min(maxWidth / width, maxHeight / height);
                width = Math.round(width * ratio);
                height = Math.round(height * ratio);
              }
              
              canvas.width = width;
              canvas.height = height;
              
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              
              // Convert to JPEG blob at 80% quality
              canvas.toBlob((blob) => {
                if (blob) {
                  resolve(blob);
                } else {
                  reject(new Error('Failed to optimize image'));
                }
              }, 'image/jpeg', 0.8);
            };
            img.onerror = () => reject(new Error('Failed to load image'));
            img.src = e.target.result;
          };
          reader.onerror = () => reject(new Error('Failed to read file'));
          reader.readAsDataURL(file);
        });
      };

            body: JSON.stringify({ url: scraperUrl })
